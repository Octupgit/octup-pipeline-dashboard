name: Auto-sync HubSpot Data

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC (08:00 Israel)
    - cron: '0 10 * * *'   # 10:00 UTC (12:00 Israel)
    - cron: '0 14 * * *'   # 14:00 UTC (16:00 Israel)
    - cron: '0 17 * * *'   # 17:00 UTC (19:00 Israel — end of day)
  workflow_dispatch:        # Manual trigger from GitHub UI anytime

jobs:
  sync:
    name: Refresh HubSpot Data → GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run HubSpot data refresh
        env:
          HS_PAT: ${{ secrets.HS_PAT }}
        run: python3 scripts/refresh_data.py

      - name: Commit updated dashboard to main
        run: |
          git config user.name  "octup-sync-bot"
          git config user.email "sync@octup.com"
          git add octup-pipeline-dashboard.html
          if git diff --staged --quiet; then
            echo "No data changes detected — skipping commit"
          else
            git commit -m "chore: auto-sync HubSpot data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
          fi

      - name: Trigger Cloud Run deploy
        run: echo "Cloud Run deployment triggered automatically by push to main"
